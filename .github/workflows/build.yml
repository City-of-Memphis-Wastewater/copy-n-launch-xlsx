# .github/workflows/build.yml

name: Build artifacts

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, macos-13]

    steps:
      - name: Clean Build Directories (Unix/macOS)
        if: runner.os != 'Windows'
        run: |
          echo "Cleaning build directories..."
          rm -rf dist/ build/ *.egg-info
          echo "Clean complete."
          
      - name: Clean Build Directories (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          echo "Cleaning build directories..."
          # Use Remove-Item with -Recurse and -Force (PowerShell native)
          Remove-Item -Path dist/, build/, *.egg-info -Recurse -Force -ErrorAction SilentlyContinue
          echo "Clean complete."
          
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          # This ensures the created venv is activated implicitly
          cache: pip

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install build dependencies
        run: |
          uv sync --group dev
          uv pip install pyinstaller # assurance

      - name: Build wheel & sdist
        if: matrix.os == 'ubuntu-latest' # ONLY build this once
        run: uv run python -m build --sdist

      - name: Build PYZ (shiv)
        if: True # runner.os == 'Windows'
        run: |
          uv run python build_pyz.py
          uv run python -c "from pathlib import Path; print('===== DIST ====='); [print(p) for p in sorted(Path('dist').rglob('*'))]"
          
      - name: Build executable (PyInstaller)
        run: |
          uv run python build_executable.py --mode onedir

      - name: Build onefile executable for Windows (PyInstaller)
        if: runner.os == 'Windows'
        run: |
          uv run python build_executable.py --mode onefile
      
      - name: Post-Build Cleanup (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Removing redundant generic artifacts from both Windows builds..."
          # Remove sdist and wheel to prevent Release upload collisions with the Ubuntu runner's versions
          Remove-Item "dist/*.tar.gz" -ErrorAction SilentlyContinue
          Remove-Item "dist/*.whl" -ErrorAction SilentlyContinue
          Write-Host "Cleanup complete."

      - name: Post-Build Cleanup (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Removing redundant generic artifacts from macOS build..."
          # Delete sdist and wheel to prevent collisions with the Ubuntu runner
          rm -f dist/*.tar.gz dist/*.whl
          echo "Cleanup complete."

      # --- DEEP VERBOSE DIAGNOSTIC DISCOVERY ---
      - name: Diagnostic, List Every Single Output File
        shell: pwsh
        run: |
          Write-Host "========================================="
          Write-Host "     CRITICAL BUILD DIRECTORY TREE       "
          Write-Host "========================================="
          if (Test-Path dist) {
              # Recursive file search to reveal exactly what PyInstaller named the outputs
              # Get-ChildItem dist -Recurse | Select-Object FullName, Length, PSIsContainer | Format-Table -AutoSize
              Get-ChildItem dist -Recurse |
                  Select-Object @{
                      Name='Path'
                      Expression = {
                          (Resolve-Path -Relative $_.FullName) -replace '^[\\/]*dist[\\/]?', ''
                      }
                  }, Length, PSIsContainer |
                  Format-Table -AutoSize
          } else {
              Write-Error "CRITICAL: The dist/ folder doesn't even exist!"
          }
          Write-Host "========================================="

      # --- 3. TEMPORARY SWAP-IN TO BYPASS BREAKING ACTIONS ---
      - name: Safe Search and Collect Setup
        shell: pwsh
        run: |
          Write-Host "Scanning for artifact targets..."
          # Instead of throwing code 1 if missing, check soft-matching contents
          $has_onedir = Test-Path "dist/onedir/*"
          $has_onefile = Test-Path "dist/onefile/*"
          Write-Host "Contains onedir contents: $has_onedir"
          Write-Host "Contains onefile contents: $has_onefile"

      - name: Collect Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -Path dist/upload -ItemType Directory -Force
          
          # Grab all dynamic entries within onedir and onefile sub-directories directly
          # ouch $items = Get-ChildItem "dist/onedir/*", "dist/onefile/*" -Exclude "upload"
          $items = @(
              Get-ChildItem "dist/onedir" -Directory
              Get-ChildItem "dist/onefile" -File
          )
          $items | Select-Object FullName, PSIsContainer | Format-Table
          
          foreach ($item in $items) {
              $destination = "dist/upload/$($item.Name).zip"
              Write-Host "Archiving $($item.FullName) to $destination"
              
              if ($item.PSIsContainer) {
                  Compress-Archive -Path "$($item.FullName)\*" -DestinationPath $destination -Force
              } else {
                  Compress-Archive -Path $item.FullName -DestinationPath $destination -Force
              }
          }

      # --- STRUCTURAL FIX: ROBUST UNIX ARTIFACT ZIPPER ---
      - name: Collect Unix artifacts
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/upload

          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            cp dist/*.tar.gz dist/upload/ 2>/dev/null || true
            cp dist/*.whl dist/upload/ 2>/dev/null || true
          fi

          echo "Collecting platform-specific outputs..."
          # Match files or directories inside mode folders generically
          for item in dist/onedir/* dist/onefile/* dist/zipapp/*; do
            [ -e "$item" ] || continue

            # Skip tracking recursive uploads or build configuration artifacts
            case "$item" in
              *upload*|*.tar.gz|*.whl) continue ;;
            esac

            base=$(basename "$item")
            parent=$(dirname "$item")

            if [ -d "$item" ]; then
              tar -czf "dist/upload/${base}.tar.gz" -C "$parent" "$base"
            elif [ -f "$item" ]; then
              cp "$item" dist/upload/
            fi
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: copy-n-launch-xlsx-${{ matrix.os }}
          path: dist/upload/

  attach-to-release:
    name: Attach artifacts to GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts (from all three OS runners)
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Diagnostic - List Downloaded Artifacts
        shell: bash
        run: |
          echo "=== Global Artifacts Directory Structure ==="
          # This shows exactly which files were pulled from which runner
          find artifacts -maxdepth 3 -not -path '*/.*'
          
          echo "=== Checking for Filename Collisions ==="
          # This counts how many times each filename appears across all runner folders
          find artifacts -type f -not -path '*/.*' -printf "%f\n" | sort | uniq -c | sort -nr

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          #overwrite: true
          overwrite_files: true # depends on version
          fail_on_unmatched_files: true # fails if empty
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
