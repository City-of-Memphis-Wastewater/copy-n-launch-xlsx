# .github/workflows/docker.yml

name: Build and push multi-arch copy-n-launch-xlsx image

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    if: github.event.release.prerelease == false && !contains(github.ref, '-test')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          TAG=${GITHUB_REF_NAME}
          LOWER_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ghcr.io/$LOWER_OWNER/copy-n-launch-xlsx:$TAG \
            -t ghcr.io/$LOWER_OWNER/copy-n-launch-xlsx:latest \
            -f Dockerfile.multi-dev . \
            --push
