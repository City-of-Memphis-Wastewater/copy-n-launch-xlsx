name: Run Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the actual application code
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          path: "copy-n-launch-xlsx"

      # Step 3: Set up Python and environment
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Run tests
        run: |
          cd "copy-n-lauch-xlsx"
          uv sync
          uv run pytest -v
