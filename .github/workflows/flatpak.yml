# .github/workflows/flatpak.yml
name: Build Flatpak Bundle

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  flatpak:
    name: Build Flatpak Application
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Flatpak Framework & Register Flathub
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          # Register the Flathub remote mirror to resolve SDK dependencies cleanly
          flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Vendor Python Dependencies for Sandbox Environment
        run: |
          mkdir -p vendor-wheels
          # Let uv run standard download tools directly against your pyproject.toml package context
          uv run pip download . -d vendor-wheels
          
      # This action sets up the flathub remotes, pulls the SDK, and compiles the bundle safely
      - name: Build and Package Flatpak Bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: io.github.city_of_memphis_wastewater.copy_n_launch_xlsx.yaml
          bundle: copy-n-launch-xlsx.flatpak
          run-tests: false

      - name: Attach Flatpak Asset to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: copy-n-launch-xlsx.flatpak
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
