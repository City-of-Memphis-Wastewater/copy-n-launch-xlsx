# .github/workflows/flatpak.yml
name: Build Flatpak Bundle

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  flatpak:
    name: Build Flatpak Application
    runs-on: ubuntu-latest
    # Run inside the official Flathub builder container environment
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-23.08
      options: --privileged
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Vendor Python Dependencies for Sandbox Environment
        run: |
          mkdir -p vendor-wheels
          uv run pip download . -d vendor-wheels

      - name: Build and Package Flatpak Bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: io.github.city_of_memphis_wastewater.copy_n_launch_xlsx.yaml
          bundle: copy-n-launch-xlsx.flatpak
          run-tests: false
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Attach Flatpak Asset to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: copy-n-launch-xlsx.flatpak
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
